AWSTemplateFormatVersion: "2010-09-09"
Description: "Security Groups for DevSecOps Project - Refreshed Version"

Resources:
  # ১. মেইন সিকিউরিটি গ্রুপ (EKS Nodes-এর জন্য)
  DevSecOpsSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Security group for EKS Nodes"
      VpcId: !ImportValue DevSecOps-VPC-ID
      SecurityGroupIngress:
        # SSH (নিজের আইপি দিয়ে পরে রেস্ট্রিক্ট করতে পারো)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        # তোমার অ্যাপ পোর্ট (Server runs on 8003)
        - IpProtocol: tcp
          FromPort: 8003
          ToPort: 8003
          CidrIp: 0.0.0.0/0
        # K8s Internal Communication
        - IpProtocol: tcp
          FromPort: 10250
          ToPort: 10250
          SourceSecurityGroupId: !Ref ALBSecurityGroup # ALB থেকে ট্রাফিক আসার জন্য
      Tags:
        - Key: Name
          Value: devsecops-main-sg

  # ২. ডাটাবেস সিকিউরিটি গ্রুপ
  DBSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Allow Aurora DB Access"
      VpcId: !ImportValue DevSecOps-VPC-ID
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref DevSecOpsSecurityGroup # শুধু নোড থেকে এক্সেস পাবে
      Tags:
        - Key: Name
          Value: devsecops-db-sg-v2 # নামটা একটু বদলে দিলাম যাতে পুরনোটার সাথে না গোলায়

  # ৩. ALB সিকিউরিটি গ্রুপ (যদি তুমি আলাদা করে এখানে রাখতে চাও)
  ALBSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "ALB Public Access"
      VpcId: !ImportValue DevSecOps-VPC-ID
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

Outputs:
  DevSecOpsSGID:
    Value: !Ref DevSecOpsSecurityGroup
    Export:
      Name: DevSecOps-SG
  DBSecurityGroupID:
    Value: !Ref DBSecurityGroup
    Export:
      Name: DBSecurityGroupID
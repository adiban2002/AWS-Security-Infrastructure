AWSTemplateFormatVersion: "2010-09-09"
Description: "Fixed Network ACL for DevSecOps - String Fixed"

Resources:
  DevSecOpsNACL:
    Type: "AWS::EC2::NetworkAcl"
    Properties:
      VpcId: !ImportValue "DevSecOps-VPC-ID"
      Tags:
        - Key: "Name"
          Value: "devsecops-nacl"

  InboundHTTP:
    Type: "AWS::EC2::NetworkAclEntry"
    Properties:
      NetworkAclId: !Ref "DevSecOpsNACL"
      RuleNumber: 100
      Protocol: 6
      RuleAction: "allow"
      Egress: false
      CidrBlock: "0.0.0.0/0"
      PortRange:
        From: 80
        To: 80

  InboundAurora:
    Type: "AWS::EC2::NetworkAclEntry"
    Properties:
      NetworkAclId: !Ref "DevSecOpsNACL"
      RuleNumber: 110
      Protocol: 6
      RuleAction: "allow"
      Egress: false
      CidrBlock: "10.0.0.0/16"
      PortRange:
        From: 3306
        To: 3306

  InboundEphemeral:
    Type: "AWS::EC2::NetworkAclEntry"
    Properties:
      NetworkAclId: !Ref "DevSecOpsNACL"
      RuleNumber: 120
      Protocol: 6
      RuleAction: "allow"
      Egress: false
      CidrBlock: "0.0.0.0/0"
      PortRange:
        From: 1024
        To: 65535

  OutboundAll:
    Type: "AWS::EC2::NetworkAclEntry"
    Properties:
      NetworkAclId: !Ref "DevSecOpsNACL"
      RuleNumber: 200
      Protocol: -1
      RuleAction: "allow"
      Egress: true
      CidrBlock: "0.0.0.0/0"

  PrivateAssocA:
    Type: "AWS::EC2::SubnetNetworkAclAssociation"
    Properties:
      SubnetId: !ImportValue "DevSecOps-Private-Subnet-A"
      NetworkAclId: !Ref "DevSecOpsNACL"

  PrivateAssocB:
    Type: "AWS::EC2::SubnetNetworkAclAssociation"
    Properties:
      SubnetId: !ImportValue "DevSecOps-Private-Subnet-B"
      NetworkAclId: !Ref "DevSecOpsNACL"
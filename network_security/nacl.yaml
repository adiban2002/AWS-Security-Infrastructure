AWSTemplateFormatVersion: "2010-09-09"
Description: Network ACL for DevSecOps Project (IPv4 + IPv6, Multi-AZ Ready)

Resources:

  DevSecOpsNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !ImportValue DevSecOps-VPC-ID
      Tags:
        - Key: Name
          Value: devsecops-nacl

  InboundHTTPIPv4:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange: { From: 80, To: 80 }

  InboundHTTPSIPv4:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange: { From: 443, To: 443 }

  InboundEphemeralIPv4:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange: { From: 1024, To: 65535 }


  InboundHTTPIPv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 130
      Protocol: 6
      RuleAction: allow
      Egress: false
      Ipv6CidrBlock: ::/0
      PortRange: { From: 80, To: 80 }

  InboundHTTPSIPv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 140
      Protocol: 6
      RuleAction: allow
      Egress: false
      Ipv6CidrBlock: ::/0
      PortRange: { From: 443, To: 443 }

  InboundEphemeralIPv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 150
      Protocol: 6
      RuleAction: allow
      Egress: false
      Ipv6CidrBlock: ::/0
      PortRange: { From: 1024, To: 65535 }

  OutboundAllIPv4:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 200
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  OutboundAllIPv6:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DevSecOpsNACL
      RuleNumber: 210
      Protocol: -1
      RuleAction: allow
      Egress: true
      Ipv6CidrBlock: ::/0


  PublicSubnetAssociationA:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !ImportValue DevSecOps-Public-Subnet-A
      NetworkAclId: !Ref DevSecOpsNACL

  PublicSubnetAssociationB:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !ImportValue DevSecOps-Public-Subnet-B
      NetworkAclId: !Ref DevSecOpsNACL

  PrivateSubnetAssociationA:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !ImportValue DevSecOps-Private-Subnet-A
      NetworkAclId: !Ref DevSecOpsNACL

  PrivateSubnetAssociationB:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !ImportValue DevSecOps-Private-Subnet-B
      NetworkAclId: !Ref DevSecOpsNACL

Outputs:
  NACLId:
    Value: !Ref DevSecOpsNACL
AWSTemplateFormatVersion: "2010-09-09"
Description: "EKS Managed Node Group - No SSH Version"

Resources:
  EKSNodeGroup:
    Type: "AWS::EKS::Nodegroup"
    Properties:
      ClusterName: "devsecops-eks" 
      NodegroupName: "devsecops-node-group-v1-33"
      Version: "1.33"
      NodeRole: !ImportValue DevSecOps-EKS-Node-Role
      Subnets:
        - !ImportValue DevSecOps-Public-Subnet-A
        - !ImportValue DevSecOps-Public-Subnet-B
      ScalingConfig:
        MinSize: 1
        DesiredSize: 2
        MaxSize: 3
      InstanceTypes:
        - "t3.medium"
      AmiType: "AL2023_x86_64_STANDARD"
      DiskSize: 20
      CapacityType: "ON_DEMAND"
      # RemoteAccess সেকশনটি সরিয়ে দেওয়া হলো
      UpdateConfig:
        MaxUnavailable: 1
      Labels:
        environment: "production"
        nodegroup: "devsecops"
      Tags:
        Name: "devsecops-node-group"
        "kubernetes.io/cluster/devsecops-eks": "owned"

Outputs:
  NodeGroupName:
    Description: "EKS Node Group Name"
    Value: !Ref EKSNodeGroup
AWSTemplateFormatVersion: "2010-09-09"
Description: "IAM Roles for EKS Cluster and Node Group - v1.33 Standard Fix"

Resources:
  EKSClusterRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "eks.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
        - "arn:aws:iam::aws:policy/AmazonEKSServicePolicy"
        - "arn:aws:iam::aws:policy/AmazonEKSVPCResourceController"
      Tags:
        - Key: "Name"
          Value: "devsecops-eks-cluster-role"

  EKSNodeRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "ec2.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
        - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
        - "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
        - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore" 
      Tags:
        - Key: "Name"
          Value: "devsecops-eks-node-role"

Outputs:
  ClusterRoleArn:
    Value: !GetAtt EKSClusterRole.Arn
    Export:
      Name: "DevSecOps-EKS-Cluster-Role"

  NodeRoleArn:
    Value: !GetAtt EKSNodeRole.Arn
    Export:
      Name: "DevSecOps-EKS-Node-Role"
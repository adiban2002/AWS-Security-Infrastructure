AWSTemplateFormatVersion: "2010-09-09"
Description: "IAM Roles for EKS Cluster and Node Group with ALB Controller Support"

Resources:
  # ১. EKS ক্লাস্টারের জন্য রোল
  EKSClusterRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "eks.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
        - "arn:aws:iam::aws:policy/AmazonEKSVPCResourceController"
      Tags:
        - Key: "Name"
          Value: "devsecops-eks-cluster-role"

  # ২. ওয়ার্কার নডগুলোর জন্য রোল (ALB এবং SSM সাপোর্টসহ)
  EKSNodeRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "ec2.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
        - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
        - "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
        - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
        # লোড ব্যালেন্সার কন্ট্রোলারের জন্য প্রয়োজনীয় (যদি আলাদা পলিসি না থাকে)
        - "arn:aws:iam::aws:policy/ElasticLoadBalancingFullAccess" 
      Tags:
        - Key: "Name"
          Value: "devsecops-eks-node-role"

Outputs:
  ClusterRoleArn:
    Value: !GetAtt EKSClusterRole.Arn
    Export:
      Name: "DevSecOps-EKS-Cluster-Role"
  NodeRoleArn:
    Value: !GetAtt EKSNodeRole.Arn
    Export:
      Name: "DevSecOps-EKS-Node-Role"
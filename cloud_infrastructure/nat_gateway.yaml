AWSTemplateFormatVersion: "2010-09-09"
Description: NAT Gateway for DevSecOps Project

Resources:

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      SubnetId: subnet-0c76b537c53a2492c
      Tags:
        - Key: Name
          Value: devsecops-nat